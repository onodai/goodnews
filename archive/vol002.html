<!DOCTYPE html>
<html lang="ja">
<head>

  <title>GoodNews Vol.2 – GoodNews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="../css/style.css">
  <style>
    .vol-page {
      padding: 160px 50px 120px;
    }

    .vol-layout {
      max-width: 660px;
      margin: 0 auto;
    }

    .vol-section {
      margin-bottom: 100px;
    }

    .vol-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.6;
      text-align: center;
      margin-bottom: 8px;
    }

    .vol-theme {
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
      color: #444;
      margin-bottom: 48px;
    }

    .vol-img {
      display: block;
      width: 100%;
      margin-bottom: 12px;
    }

    .vol-text {
      font-size: 13px;
      line-height: 1.8;
      margin-bottom: 12px;
    }

    @media (max-width: 768px) {
      .vol-page {
        padding: 110px 28px 80px;
      }
    }

    @media (max-width: 480px) {
      .vol-page {
        padding: 100px 24px 64px;
      }
    }

<body>
  <div class="desktop">
    <header>
      <a href="../index.html" class="logo" aria-label="GoodNews">
        <img src="../image/logo/GN_logo_blk.svg" alt="GoodNews">
      </a>
      <button class="menu-toggle" aria-label="メニュー"><span></span><span></span><span></span></button>
      <nav>
        <a href="../index.html">ABOUT</a>
        <a href="../news.html">NEWS</a>
        <a href="../archive.html">ARCHIVE</a>
        <a href="../space.html">SPACE</a>
      </nav>
    </header>

    <main class="vol-page">
      <div class="vol-layout">

        <div class="vol-section">
          <p class="vol-title">GoodNews Vol.2</p>
          <p class="vol-theme">Diorama</p>

          <img class="vol-img" src="../image/archive/vol2/vol2-1.jpg" alt="GoodNews Vol.2">

          <p class="vol-text">
            GoodNews Vol.2 は2024年1月26日から1月29日の3日間に渡り開催されました。参加したアーティストは0039、小野台、片岡玉結、髙木理子、野崎想の5名。<br>
            東京都板橋区のcopycentergalleryにて新作ZINEの販売を行いました。<br>
            同フロアでは髙木理子氏と急遽参加した堀内蓮氏によるプロジェクトの展示「Crossing Letter」が開催されこのプロジェクトは現在も続いている。
          </p>

          <img class="vol-img" src="../image/archive/vol2/vol2-2.webp" alt="GoodNews Vol.2">
        </div>

      </div>
    </main>
