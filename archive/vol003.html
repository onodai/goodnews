<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GoodNews Vol.3 – GoodNews</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .vol-page {
      padding: 160px 50px 120px;
    }

    .vol-layout {
      max-width: 660px;
      margin: 0 auto;
    }

    .vol-section {
      margin-bottom: 100px;
    }

    .vol-title {
      font-size: 16px;
      font-weight: 600;
      line-height: 1.6;
      text-align: center;
      margin-bottom: 8px;
    }

    .vol-theme {
      font-size: 13px;
      line-height: 1.6;
      text-align: center;
      color: #444;
      margin-bottom: 48px;
    }

    .vol-text {
      font-size: 13px;
      line-height: 1.8;
      margin-bottom: 48px;
    }

    .vol-embed-wrapper {
      position: relative;
      padding-top: 56.25%;
      width: 100%;
      margin-bottom: 48px;
    }

    .vol-embed-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 768px) {
      .vol-page {
        padding: 110px 28px 72px;
      }
    }

    @media (max-width: 480px) {
      .vol-page {
        padding: 100px 24px 60px;
      }
    }
  </style>
</head>
<body>
  <div class="desktop">
    <header>
      <a href="../index.html" class="logo" aria-label="GoodNews">
        <img src="../image/logo/GN_logo_blk.svg" alt="GoodNews">
      </a>
      <button class="menu-toggle" aria-label="メニュー"><span></span><span></span><span></span></button>
      <nav>
        <a href="../index.html">ABOUT</a>
        <a href="../news.html">NEWS</a>
        <a href="../archive.html">ARCHIVE</a>
        <a href="../space.html">SPACE</a>
      </nav>
    </header>

    <main class="vol-page">
      <div class="vol-layout">

        <div class="vol-section">
          <p class="vol-title">GoodNews Vol.3</p>
          <p class="vol-theme">DJ 即興 占い</p>

          <div class="vol-embed-wrapper">
            <iframe src="https://docs.google.com/presentation/d/1fpIxmla9s2I8Qf5mc4EoIBXi3wTGGBADWmDOXhCob-U/embed"
                    allowfullscreen>
            </iframe>
          </div>

          <p class="vol-text">
            GoodNews Vol.3 は2023年10月25日に開催されました。<br>
            参加したアーティストは<br>
            DJ：DJ ピロピロ（大木裕之）、seaketa<br>
            LIVE：fu sakai、りんご虫、toulavi、金子真大<br>
            占い：月宇多七夕<br>
            <br>
            open: 18:30〜　start : 19:00<br>
            高円寺forth floor II<br>
            <br>
            photo : Kazuki Majima
          </p>

          <div class="vol-embed-wrapper">
            <iframe src="https://www.youtube.com/embed/IgVJMX8r5V8"
                    title="GoodNews Vol.3"
                    allowfullscreen
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture">
            </iframe>
          </div>
        </div>

      </div>
    </main>
  </div>
  <script src="../js/main.js"></script>
</body>
</html>
